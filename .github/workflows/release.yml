name: Release BongLauncher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Build Windows packages
        run: npm run build:release

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          if-no-files-found: error
          path: |
            dist/BongLauncher-Setup-*.exe
            dist/BongLauncher-Setup-*.exe.blockmap
            dist/BongLauncher-Portable-*.exe
            dist/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Build macOS icon
        run: npm run icon:mac

      - name: Build macOS packages
        run: npm run build:mac

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          if-no-files-found: error
          path: |
            dist/BongLauncher-*-mac-universal.dmg
            dist/BongLauncher-*-mac-universal.dmg.blockmap
            dist/BongLauncher-*-mac-universal.zip
            dist/latest-mac.yml

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: ${{ always() && needs.build-windows.result == 'success' }}
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
